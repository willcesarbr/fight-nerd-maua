<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight Nerd Mauá - Painel de Torneio e Gerenciamento</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-red: #ef4444;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel h2 {
            margin-bottom: 15px;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 8px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: #fff;
            font-size: 1rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-red), #b91c1c);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        /* Seção do Visualizador / Avatar WEBP */
        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .upload-dropzone {
            width: 100%;
            height: 250px;
            border: 2px dashed #475569;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .upload-dropzone:hover {
            border-color: var(--accent-gold);
        }

        .upload-dropzone input[type="file"] {
            display: none;
        }

        .upload-dropzone img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .placeholder-hint {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 0 10px;
        }

        /* Leaderboard e Hall da Infâmia */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .leaderboard-list {
            list-style: none;
            max-height: 350px;
            overflow-y: auto;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid var(--accent-gold);
        }

        .infamy-item {
            border-left-color: var(--accent-red);
        }
    </style>
</head>
<body>

    <header>
        <h1>Fight Nerd Mauá</h1>
        <p>Painel de Controle, Votação e Visualizador WEBP Integrado</p>
    </header>

    <div class="main-container">
        <!-- Coluna de Administração / Upload -->
        <div class="panel">
            <h2>Gerenciador e Avatar</h2>
            <div class="form-group">
                <label>Nome do Jogador</label>
                <input type="text" id="playerName" placeholder="Ex: Player 1">
            </div>

            <div class="form-group">
                <label>Avatar (Suporta WEBP Animado / GIF / PNG)</label>
                <div class="viewer-container">
                    <div class="upload-dropzone" onclick="document.getElementById('fileInput').click();">
                        <input type="file" id="fileInput" accept="image/webp,image/png,image/jpeg,image/gif">
                        <span class="placeholder-hint" id="placeholderText">Clique aqui ou arraste a imagem WEBP/GIF</span>
                    </div>
                </div>
            </div>

            <button class="btn" id="savePlayerBtn">Salvar Jogador</button>
        </div>

        <!-- Coluna do Dashboard / Leaderboard / Hall da Infâmia -->
        <div class="dashboard-grid">
            <div class="panel">
                <h2>Ranking em Tempo Real</h2>
                <ul class="leaderboard-list" id="leaderboardList">
                    <li class="leaderboard-item">
                        <span>Nenhum lutador registrado</span>
                        <span>0pts</span>
                    </li>
                </ul>
            </div>

            <div class="panel">
                <h2>Hall da Infâmia (Vítimas / K.O.)</h2>
                <ul class="leaderboard-list" id="infamyList">
                    <li class="leaderboard-item infamy-item">
                        <span>Nenhum registro de K.O.</span>
                        <span>-</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "seu-projeto.firebaseapp.com",
            databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com",
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "000000000000",
            appId: "1:000000000000:web:0000000000000000"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();

        // Lógica de Visualização e Renderização Nativa para WEBP Animado e GIFs
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.querySelector('.upload-dropzone');
        const placeholderText = document.getElementById('placeholderText');
        let currentObjectUrl = null;

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('Selecione um arquivo de imagem válido (WEBP, PNG, GIF).');
                return;
            }

            const existingImg = dropzone.querySelector('img');
            if (existingImg) existingImg.remove();

            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
            }

            // O uso de createObjectURL assegura o comportamento fluido de WebPs animados
            currentObjectUrl = URL.createObjectURL(file);
            
            const img = document.createElement('img');
            img.src = currentObjectUrl;
            
            placeholderText.style.display = 'none';
            dropzone.appendChild(img);
        });

        // Salvamento no Firebase Realtime Database
        document.getElementById('savePlayerBtn').addEventListener('click', function() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                alert('Insira o nome do lutador!');
                return;
            }

            const playerRef = database.ref('fighters').push();
            playerRef.set({
                name: name,
                score: 0,
                status: 'ativo',
                createdAt: Date.now()
            }, (error) => {
                if (error) {
                    alert('Erro ao salvar no banco de dados.');
                } else {
                    alert('Lutador cadastrado com sucesso!');
                    document.getElementById('playerName').value = '';
                }
            });
        });

        // Sincronização em tempo real do Leaderboard
        database.ref('fighters').on('value', (snapshot) => {
            const data = snapshot.val();
            const leaderboardList = document.getElementById('leaderboardList');
            leaderboardList.innerHTML = '';

            if (!data) {
                leaderboardList.innerHTML = '<li class="leaderboard-item"><span>Nenhum lutador registrado</span><span>0pts</span></li>';
                return;
            }

            Object.keys(data).forEach(key => {
                const fighter = data[key];
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.innerHTML = `<span>${fighter.name}</span><span>${fighter.score || 0} pts</span>`;
                leaderboardList.appendChild(li);
            });
        });
    </script>
</body>
</html>
