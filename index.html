<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fight Nerd Mauá - Arcade Arena</title>
  
  <!-- Fontes Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  
  <!-- Cropper.js CSS (Para cortar foto estilo WhatsApp) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

  <style>
    :root {
      --bg-dark: #0a0a0f;
      --card-bg: rgba(20, 20, 35, 0.75);
      --neon-cyan: #00e5ff;
      --neon-pink: #ff0055;
      --neon-gold: #ffd700;
      --text-color: #f0f0f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-color);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 20%, rgba(255, 0, 85, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(0, 229, 255, 0.15) 0%, transparent 40%);
      padding-bottom: 50px;
      overflow-x: hidden;
    }

    /* Header */
    header {
      text-align: center;
      padding: 30px 15px;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--neon-pink);
      box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
      margin-bottom: 30px;
    }

    header h1 {
      font-family: 'Bangers', cursive;
      font-size: 3rem;
      letter-spacing: 2px;
      color: var(--neon-gold);
      text-shadow: 3px 3px 0px var(--neon-pink), 0 0 10px rgba(255, 215, 0, 0.5);
    }

    header p {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: var(--neon-cyan);
      margin-top: 5px;
    }

    .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

    /* Botão Flutuante de Cadastro */
    .btn-cadastrar-flutuante {
      background: var(--neon-cyan);
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      border: none;
      padding: 15px 30px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      display: block;
      margin: 0 auto 30px auto;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
      transition: transform 0.2s;
    }
    .btn-cadastrar-flutuante:hover { transform: scale(1.05); }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      color: var(--neon-cyan);
      margin: 30px 0 15px 0;
      text-transform: uppercase;
      border-left: 4px solid var(--neon-pink);
      padding-left: 10px;
    }

    /* Grid de Jogadores */
    .grid-players {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .player-card {
      background: var(--card-bg);
      border: 2px solid rgba(0, 229, 255, 0.3);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .player-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--neon-gold);
      margin-bottom: 15px;
      background: #000;
    }

    .player-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #fff;
    }

    /* O Botão Roxo Melhorado para Registro de Resultado */
    .btn-votar {
      background: linear-gradient(180deg, #8a2be2, #4b0082);
      color: #fff;
      border: 2px solid #a855f7;
      padding: 12px 15px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 800;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 0.95rem;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(138, 43, 226, 0.6), inset 0 2px 5px rgba(255, 255, 255, 0.3);
      transition: all 0.2s;
    }

    .btn-votar:hover {
      background: linear-gradient(180deg, #9f3cf3, #5c00a3);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(138, 43, 226, 0.8), inset 0 2px 5px rgba(255, 255, 255, 0.4);
    }
    
    .btn-votar:active {
      transform: translateY(2px);
      box-shadow: 0 1px 5px rgba(138, 43, 226, 0.8);
    }

    /* Modais */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: flex; justify-content: center; align-items: center;
      z-index: 999; padding: 15px;
    }

    .modal-card {
      background: #12121c;
      border: 2px solid var(--neon-cyan);
      border-radius: 16px;
      padding: 25px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
    }

    /* Efeito Explosivo de K.O. */
    .explosao-ko {
      font-family: 'Bangers', cursive;
      font-size: 5rem;
      color: var(--neon-gold);
      text-transform: uppercase;
      margin: 10px 0;
      animation: koExplode 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards, screenShake 0.5s;
      text-shadow: 
        5px 5px 0px var(--neon-pink), 
        -5px -5px 0px var(--neon-cyan),
        0 0 30px rgba(255, 215, 0, 1);
    }

    @keyframes koExplode {
      0% { transform: scale(0.1) rotate(-15deg); opacity: 0; filter: brightness(3); }
      50% { transform: scale(1.3) rotate(5deg); opacity: 1; filter: brightness(2); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
    }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-10px, 10px); }
      40% { transform: translate(10px, -10px); }
      60% { transform: translate(-10px, -10px); }
      80% { transform: translate(10px, 10px); }
      100% { transform: translate(0, 0); }
    }

    .frase-epica {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--text-color);
      margin-top: 20px;
      font-style: italic;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    /* Editor de Imagem (Cropper) */
    .cropper-container-wrapper {
      width: 100%;
      height: 300px;
      background: #000;
      margin: 15px 0;
      display: none; /* Só mostra quando seleciona foto */
    }

    .modal-inputs {
      display: flex; flex-direction: column; gap: 15px; margin: 20px 0;
    }
    
    .modal-inputs input[type="text"] {
      padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 1rem;
      border: 1px solid var(--neon-cyan); border-radius: 6px;
      background: rgba(0,0,0,0.5); color: #fff;
    }
    
    .modal-inputs input[type="file"] {
      color: var(--neon-cyan); font-family: 'Montserrat', sans-serif;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    
    .btn-confirmar {
      flex: 1; background: var(--neon-cyan); color: #000; font-weight: 800;
      font-family: 'Orbitron', sans-serif; border: none; padding: 12px;
      border-radius: 6px; cursor: pointer; text-transform: uppercase;
    }
    
    .btn-cancelar {
      flex: 1; background: transparent; color: #aaa; border: 1px solid #555;
      font-family: 'Orbitron', sans-serif; padding: 12px; border-radius: 6px; cursor: pointer;
    }

    /* Admin Panel */
    .admin-list {
      text-align: left; max-height: 250px; overflow-y: auto; margin: 15px 0;
    }
    .admin-item {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; margin-bottom: 8px;
    }
    .btn-liberar {
      background: var(--neon-pink); color: #fff; border: none; padding: 5px 10px;
      border-radius: 4px; cursor: pointer; font-weight: bold;
    }

    footer { text-align: center; margin-top: 50px; color: #666; font-size: 0.8rem; }
    .btn-admin-link { background: none; border: none; color: #555; cursor: pointer; text-decoration: underline; margin-top: 15px; }
  </style>
</head>
<body>

  <header>
    <h1>FIGHT NERD MAUÁ</h1>
    <p>ARCADE TOURNAMENT ARENA</p>
  </header>

  <main class="container">
    <button class="btn-cadastrar-flutuante" onclick="abrirModalCadastro()">+ CADASTRAR JOGADOR</button>
    
    <h2 class="section-title">DESAFIANTES NA ARENA</h2>
    <div class="grid-players" id="gridPlayers">
      <!-- Jogadores serão renderizados aqui via JS -->
    </div>
  </main>

  <!-- MODAL: CADASTRO COM CROPPER (Estilo WhatsApp) -->
  <div id="modalCadastro" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <h2 style="color: var(--neon-cyan); font-family: 'Orbitron', sans-serif;">NOVO LUTADOR</h2>
      <p style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">*Apenas 1 registro permitido por aparelho.</p>
      
      <div class="modal-inputs">
        <input type="text" id="inputNome" placeholder="Digite seu Nome ou Nick">
        <input type="file" id="inputFoto" accept="image/*">
        
        <div class="cropper-container-wrapper" id="cropperWrapper">
          <img id="imageToCrop" src="" style="max-width: 100%;">
        </div>
      </div>

      <div class="modal-actions">
        <button onclick="salvarJogador()" class="btn-confirmar">REGISTRAR</button>
        <button onclick="fecharModal('modalCadastro')" class="btn-cancelar">CANCELAR</button>
      </div>
    </div>
  </div>

  <!-- MODAL: EXPLOSÃO K.O. (Confirmação de Vitória) -->
  <div id="modalKO" class="modal-overlay" style="display: none;">
    <div class="modal-card" style="background: transparent; border: none; box-shadow: none;">
      <div id="animacaoKO" class="explosao-ko">K.O. !</div>
      <p id="fraseEpica" class="frase-epica">...</p>
      <button onclick="fecharModal('modalKO')" class="btn-confirmar" style="margin-top: 30px; width: 200px;">Continuar</button>
    </div>
  </div>

  <!-- MODAL: ADMIN (Liberação de Aparelho) -->
  <div id="modalAdmin" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <h2 style="color: var(--neon-gold); font-family: 'Orbitron', sans-serif;">PAINEL ADMIN</h2>
      <p style="font-size: 0.85rem; margin-bottom: 15px;">Gerenciar bloqueio de aparelhos</p>
      
      <div class="admin-list" id="listaAparelhos">
        <!-- Lista de aparelhos bloqueados carregará aqui -->
      </div>

      <div class="modal-actions">
        <!-- Simulação de destravamento geral para o protótipo -->
        <button onclick="liberarMeuAparelho()" class="btn-confirmar" style="background: var(--neon-pink); color: #fff;">Liberar MEU Aparelho</button>
        <button onclick="fecharModal('modalAdmin')" class="btn-cancelar">FECHAR</button>
      </div>
    </div>
  </div>

  <footer>
    <p>Fight Nerd Mauá &copy; Arena Arcade</p>
    <button class="btn-admin-link" onclick="acessarAdmin()">Acesso Restrito (Admin)</button>
  </footer>

  <!-- Bibliotecas de JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <!-- Firebase SDKs (v9 Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    // ==========================================
    // 1. O ARSENAL COMPLETO DE FRASES (Zoeira + Animes + Anti-heróis)
    // ==========================================
    const frasesKO = [
      // Cavaleiros e Shounen (Sua lista)
      "Vamos! Levante-se Seiya!", "Coragem Seiya!", "Força, Seiya!", "Lute, Seiya!", 
      "Não morra Seiya!", "Não cuspa os dentes, Seiya!", "Não perca litros de sangue, Seiya!", 
      "Não tenha traumatismos, Seiya!", "Saoori!", "Por Athena!", "Eu não desisto Nunca!", 
      "Preciso de milagre!", "Esse é o meu jeito Ninja!", "Queime Cosmo!", "Alcance o sétimo sentido!", 
      "Não perca as esperanças, Seiya!", "Não perca os sentidos, Seiya!", "Não quebre as pernas, Seiya!", 
      "Pela Deusa!", "Me dê sua força Pegasus!", "Vamos ao encontro do mais forte!", "Nem doeu!", 
      "Insolente!", "Miserável é um gênio!", "Kaioken aumentado 100 vezes!", "Morra Seiya!", 
      "Levante as mãos para a Genki Dama", "O Naruto é duro às vezes...", "Booora!", "UP!UP!", 
      "A flor tem que ser de cerejeira", "Mais de 8 mil!",
      // Pesos Pesados / Anti-heróis
      "O seu poder de luta é de um verme insolente!", "Chamas Negras Mortais!", 
      "Você é fraco. Por que é fraco? Porque lhe falta ódio.", "Ave Fênix! Volto das cinzas para te derrotar!", 
      "Chaos Control! Muito lento...",
      // Zoeira e Hall da Infâmia
      "Perdeu a alma!", "Vamos tesouro, não se misture com essa gentalha...", "Sabe de nada, inocente!", 
      "Errou o combo até no vento!", "Apanhou tanto que o controle desconectou!", "Levou o Perfect e nem viu de onde veio!", 
      "Resetou o controle pra ver se melhorava!", "Passou vergonha no crédito e no débito!", "Chama o VAR que deu ruim!"
    ];

    // ==========================================
    // 2. VARIÁVEIS GLOBAIS E CROPPER
    // ==========================================
    let cropper;
    const dbMock = [
      { id: 1, nome: "Ryu", foto: "https://via.placeholder.com/150/000000/FFFFFF?text=RYU" },
      { id: 2, nome: "Ken", foto: "https://via.placeholder.com/150/000000/FFFFFF?text=KEN" }
    ]; // Simulação de banco de dados para o visual rodar sem Firebase configurado.

    // Configurar leitor de imagem para o Cropper
    const inputFoto = document.getElementById('inputFoto');
    const imageToCrop = document.getElementById('imageToCrop');
    const cropperWrapper = document.getElementById('cropperWrapper');

    inputFoto.addEventListener('change', function (e) {
      const files = e.target.files;
      if (files && files.length > 0) {
        const file = files[0];
        const url = URL.createObjectURL(file);
        imageToCrop.src = url;
        cropperWrapper.style.display = 'block';

        if (cropper) { cropper.destroy(); }
        
        // Ativa o corte circular/quadrado estilo WhatsApp
        cropper = new Cropper(imageToCrop, {
          aspectRatio: 1, // Quadrado perfeito (para ficar redondo no CSS)
          viewMode: 1,
          dragMode: 'move',
          autoCropArea: 1,
          restore: false,
          guides: false,
          center: false,
          highlight: false,
          cropBoxMovable: true,
          cropBoxResizable: true,
          toggleDragModeOnDblclick: false,
        });
      }
    });

    // ==========================================
    // 3. LÓGICA DE INTERFACE
    // ==========================================
    function renderizarJogadores() {
      const grid = document.getElementById('gridPlayers');
      grid.innerHTML = '';
      
      dbMock.forEach(jogador => {
        grid.innerHTML += `
          <div class="player-card">
            <img src="${jogador.foto}" alt="${jogador.nome}" class="player-avatar">
            <h3 class="player-name">${jogador.nome}</h3>
            <!-- Botão com texto específico solicitado -->
            <button class="btn-votar" onclick="registrarVitoria(${jogador.id}, '${jogador.nome}')">
               Clique aqui para registrar o resultado 👇🏼
            </button>
          </div>
        `;
      });
    }

    // ==========================================
    // 4. LÓGICA DE APARELHO E CADASTRO
    // ==========================================
    function checarBloqueioAparelho() {
      return localStorage.getItem('fightNerdDeviceLock') === 'true';
    }

    function abrirModalCadastro() {
      if (checarBloqueioAparelho()) {
        alert("Este aparelho já possui um guerreiro cadastrado! Apenas o Administrador pode liberar para um novo cadastro.");
        return;
      }
      document.getElementById('modalCadastro').style.display = 'flex';
      document.getElementById('inputNome').value = '';
      inputFoto.value = '';
      cropperWrapper.style.display = 'none';
      if (cropper) { cropper.destroy(); cropper = null; }
    }

    function salvarJogador() {
      const nome = document.getElementById('inputNome').value;
      if (!nome) return alert("Digite um nome!");
      if (!cropper) return alert("Selecione e ajuste uma foto!");

      // Pega o corte final em Base64
      const canvas = cropper.getCroppedCanvas({ width: 250, height: 250 });
      const fotoBase64 = canvas.toDataURL("image/webp");

      // Adiciona ao banco simulado (Aqui entraria o push do Firebase)
      dbMock.push({ id: Date.now(), nome: nome, foto: fotoBase64 });
      
      // TRAVA O APARELHO APÓS CADASTRAR
      localStorage.setItem('fightNerdDeviceLock', 'true');
      
      renderizarJogadores();
      fecharModal('modalCadastro');
    }

    // ==========================================
    // 5. O EFEITO K.O. EXPLOSIVO
    // ==========================================
    function registrarVitoria(id, nome) {
      // Abre o Modal Transparente
      document.getElementById('modalKO').style.display = 'flex';
      
      // Reinicia a animação CSS (truque de reflow)
      const elementoAnimacao = document.getElementById('animacaoKO');
      elementoAnimacao.style.animation = 'none';
      elementoAnimacao.offsetHeight; /* trigger reflow */
      elementoAnimacao.style.animation = null; 

      // Sorteia uma frase épica
      const fraseSorteada = frasesKO[Math.floor(Math.random() * frasesKO.length)];
      document.getElementById('fraseEpica').innerText = `"${fraseSorteada}"`;
      
      // OBS: Aqui iria sua lógica do Firebase de adicionar +1 ponto pro jogador.
    }

    // ==========================================
    // 6. PAINEL ADMIN (LIBERAÇÃO)
    // ==========================================
    function acessarAdmin() {
      const senha = prompt("Digite a senha do Mestre (Admin):");
      if (senha === "1234") { // Mude a senha depois!
        document.getElementById('modalAdmin').style.display = 'flex';
      } else if (senha !== null) {
        alert("Senha Incorreta! Treine mais.");
      }
    }

    // Como o localStorage é local do celular da pessoa, em produção o Admin
    // precisaria deletar uma 'flag' do Firebase atrelada ao UID do celular dela.
    // Para esse protótipo de 1 arquivo, fiz um botão para o próprio jogador/admin
    // limpar o localStorage do navegador atual.
    function liberarMeuAparelho() {
      localStorage.removeItem('fightNerdDeviceLock');
      alert("Aparelho liberado! Agora você pode cadastrar outro nome.");
      fecharModal('modalAdmin');
    }

    // ==========================================
    // 7. UTILITÁRIOS
    // ==========================================
    function fecharModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    // Inicializa a tela com os jogadores de teste
    renderizarJogadores();
  </script>
</body>
</html>
