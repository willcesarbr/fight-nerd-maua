<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Imagens Profissional (Suporte Completo a WEBP)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #1a1a1a;
            font-size: 24px;
        }

        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 25px;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            font-size: 16px;
            color: #475569;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .upload-label span.highlight {
            color: #2563eb;
            font-weight: 600;
        }

        .file-info {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }

        .viewer-box {
            width: 100%;
            height: 450px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #0f172a;
            position: relative;
        }

        .viewer-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .placeholder-text {
            color: #94a3b8;
            font-size: 15px;
        }

        .image-details {
            margin-top: 15px;
            text-align: left;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            color: #475569;
            border-left: 4px solid #3b82f6;
            display: none;
        }

        .image-details p {
            margin: 4px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Visualizador Avançado de Imagens</h2>
        
        <!-- Área de Upload Personalizada -->
        <div class="upload-area" onclick="document.getElementById('fileInput').click();">
            <input type="file" id="fileInput" accept="image/webp,image/png,image/jpeg,image/gif,image/svg+xml">
            <label class="upload-label" for="fileInput">
                <svg width="36" height="36" fill="none" stroke="#2563eb" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span>Clique para selecionar ou arraste sua imagem</span>
                <span class="file-info">Suporta WEBP (estático e animado), PNG, JPEG, GIF, SVG</span>
            </label>
        </div>
        
        <!-- Caixa de Exibição -->
        <div class="viewer-box" id="viewerBox">
            <span class="placeholder-text" id="placeholderText">Nenhuma imagem carregada</span>
        </div>

        <!-- Detalhes do arquivo carregado -->
        <div class="image-details" id="imageDetails">
            <p><strong>Nome:</strong> <span id="fileName">-</span></p>
            <p><strong>Tipo:</strong> <span id="fileType">-</span></p>
            <p><strong>Tamanho:</strong> <span id="fileSize">-</span></p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const viewerBox = document.getElementById('viewerBox');
        const placeholderText = document.getElementById('placeholderText');
        const imageDetails = document.getElementById('imageDetails');
        const fileNameEl = document.getElementById('fileName');
        const fileTypeEl = document.getElementById('fileType');
        const fileSizeEl = document.getElementById('fileSize');

        let currentObjectUrl = null;

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];

            if (!file) {
                return;
            }

            // Validação rigorosa de tipo de imagem (incluindo explicitamente webp)
            if (!file.type.startsWith('image/')) {
                alert('Por favor, selecione um arquivo de imagem válido (WEBP, PNG, JPG, etc.).');
                return;
            }

            // Remove imagem ou objeto anterior para evitar vazamento de memória
            const existingImage = viewerBox.querySelector('img');
            if (existingImage) {
                existingImage.remove();
            }
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
            }

            // Criação segura da URL de objeto nativa do navegador para renderizar WEBP perfeitamente
            currentObjectUrl = URL.createObjectURL(file);
            
            const img = document.createElement('img');
            img.src = currentObjectUrl;
            
            // Esconde o placeholder e insere a imagem
            placeholderText.style.display = 'none';
            viewerBox.appendChild(img);

            // Preenche os metadados da imagem
            fileNameEl.textContent = file.name;
            fileTypeEl.textContent = file.type || 'Desconhecido';
            fileSizeEl.textContent = formatBytes(file.size);
            imageDetails.style.display = 'block';
        });

        // Função utilitária para formatar o tamanho do arquivo legivelmente
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>

</body>
</html>
