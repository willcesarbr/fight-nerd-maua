<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fight Nerd Mauá</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    /* Estilo Visual Anterior (Limpo, Rápido e Direto) */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background-color: #121214; color: #e1e1e6; padding: 16px; }
    
    .container { max-width: 480px; margin: 0 auto; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #29292e; padding-bottom: 12px; }
    h1 { font-size: 1.25rem; color: #00b37e; font-weight: bold; }
    
    .btn-admin { background: #29292e; color: #c4c4cc; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }

    /* Cards de Jogadores (Layout Anterior) */
    .player-card { background: #202024; border: 1px solid #29292e; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    
    .player-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #121214; flex-shrink: 0; }
    .player-details h3 { font-size: 0.95rem; color: #fba94c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .player-details p { font-size: 0.75rem; color: #9999ab; margin-top: 2px; }

    .btn-venceu { background: #00b37e; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; cursor: pointer; flex-shrink: 0; transition: background 0.2s; }
    .btn-venceu:hover { background: #00875f; }
    .btn-venceu:active { transform: scale(0.96); }

    /* Toast de Feedback de Voto */
    .toast-vote { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #00b37e; color: white; padding: 10px 16px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; box-shadow: 0 4px 10px rgba(0,0,0,0.4); z-index: 200; transition: opacity 0.3s; }

    /* Modais */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
    .modal-hidden { display: none !important; }
    .modal-card { background: #202024; border: 1px solid #29292e; border-radius: 12px; padding: 20px; width: 100%; max-width: 320px; text-align: center; }
    .modal-card h3 { color: #fba94c; margin-bottom: 12px; font-size: 1rem; }

    /* Modal K.O. */
    .ko-header { font-size: 2rem; font-weight: 900; color: #fba94c; text-shadow: 0 0 8px #f75a68; }
    .ko-quote { background: #121214; border: 1px solid #29292e; padding: 10px; border-radius: 6px; font-style: italic; color: #e1e1e6; margin: 10px 0; font-size: 0.85rem; }
    .btn-ko-continue { background: #fba94c; color: #121214; font-weight: bold; width: 100%; padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; }

    /* Admin Inputs */
    .admin-input { width: 100%; padding: 8px; background: #121214; border: 1px solid #29292e; border-radius: 6px; color: #fff; font-size: 0.8rem; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>⚔️ Fight Nerd Mauá</h1>
      <button onclick="toggleAdminModal()" class="btn-admin">⚙️ Admin</button>
    </header>

    <!-- LISTA DE JOGADORES -->
    <div id="players-container">
      <p style="text-align:center; color:#9999ab; padding:20px;">Carregando guerreiros...</p>
    </div>
  </div>

  <!-- TOAST DE CONFIRMAÇÃO DE VOTO (LISTA 2) -->
  <div id="vote-toast" class="toast-vote modal-hidden">
    <span id="vote-toast-msg">Voto confirmado!</span>
  </div>

  <!-- MODAL DE K.O. / ZOEIRA DA DERROTA (LISTA 1) -->
  <div id="ko-modal" class="modal-overlay modal-hidden">
    <div class="modal-card">
      <div class="ko-header">💥 K.O.! 💥</div>
      <p id="ko-player-name" style="font-size:0.85rem; font-weight:bold; color:#00b37e; margin-top:6px;"></p>
      <div id="ko-phrase" class="ko-quote">"..."</div>
      <button onclick="closeKoModal()" class="btn-ko-continue">CONTINUAR 🥊</button>
    </div>
  </div>

  <!-- MODAL ADMIN -->
  <div id="admin-modal" class="modal-overlay modal-hidden">
    <div class="modal-card" style="text-align:left;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 style="margin:0;">⚙️ Painel Admin</h3>
        <button onclick="toggleAdminModal()" style="background:none; border:none; color:#aaa; font-size:1rem; cursor:pointer;">✕</button>
      </div>

      <div id="admin-auth">
        <input type="password" id="admin-pass-input" placeholder="Senha" class="admin-input">
        <button onclick="loginAdmin()" class="btn-ko-continue" style="background:#00b37e; color:#fff;">Entrar</button>
      </div>

      <div id="admin-controls" class="modal-hidden">
        <div style="margin-bottom:10px;">
          <label style="font-size:0.7rem; color:#aaa;">Novo Guerreiro:</label>
          <input type="text" id="new-player-name" placeholder="Nome" class="admin-input">
          <input type="text" id="new-player-photo" placeholder="URL da Foto" class="admin-input">
          <button onclick="addPlayer()" class="btn-ko-continue" style="background:#00b37e; color:#fff;">Cadastrar</button>
        </div>
        <div>
          <button onclick="resetScores()" style="width:100%; background:#f75a68; color:#fff; padding:6px; border:none; border-radius:6px; font-size:0.7rem; font-weight:bold; cursor:pointer;">Zerar Placar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- CONFIGURAÇÃO FIREBASE (URL REAL DO SEU PROJETO) ---
    const firebaseConfig = {
      databaseURL: "https://fightnerdmaua-default-rtdb.firebaseio.com/"
    };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- LISTA 1: ZOMBARIA DA DERROTA (EXIBIDA APENAS NO POP-UP K.O.) ---
    const DEFEAT_PHRASES = [
      "Vamos! Levante-se, Seiya!",
      "Coragem, Seiya! Lute, Seiya!",
      "Não cuspa os dentes, Seiya!",
      "Não perca litros de sangue, Seiya!",
      "Saori! Por Athena! Eu não desisto nunca!",
      "Queime Cosmo! Alcance o sétimo sentido!",
      "Me dê sua força, Pegasus!",
      "Nem doeu! Insolente!",
      "Miserável é um gênio!",
      "Kaioken aumentado 100 vezes!",
      "Morra, Seiya!",
      "Levante as mãos para a Genki Dama!",
      "O Naruto é duro às vezes...",
      "Sobra nada pro Betinha!",
      "Ficou no cheirinho...",
      "Apanhou tanto que esqueceu a senha do Wi-Fi!",
      "Anotaram a placa do caminhão?",
      "No céu tem pão? E aqui só tem surra!"
    ];

    // --- LISTA 2: CONFIRMAÇÃO DO ATO DA VOTAÇÃO (EXIBIDA APENAS NO TOAST) ---
    const VOTE_CONFIRMATIONS = [
      "⚡ Voto computado no placar com sucesso!",
      "🔥 Golpe limpo! Placar atualizado!",
      "🎯 Golpes contabilizados na arena!",
      "🥊 Vitória registrada na súmula!",
      "📊 Mais um ponto cravado na tabela!"
    ];

    let lastDefeatIndex = -1;
    let lastVoteIndex = -1;
    let playersData = {};

    // --- ESCUTAR DADOS EM TEMPO REAL ---
    db.ref("players").on("value", (snapshot) => {
      playersData = snapshot.val() || {};
      renderPlayers();
    });

    function renderPlayers() {
      const container = document.getElementById("players-container");
      const playersArray = Object.keys(playersData).map(id => ({
        id,
        ...playersData[id]
      }));

      if (playersArray.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:#9999ab; padding:20px;">Nenhum guerreiro cadastrado.</p>`;
        return;
      }

      // Ordena por maior número de vitórias
      playersArray.sort((a, b) => (b.wins || 0) - (a.wins || 0));

      container.innerHTML = playersArray.map(p => `
        <div class="player-card">
          <div class="player-info">
            <img src="${p.photo || 'https://via.placeholder.com/150'}" class="avatar">
            <div class="player-details">
              <h3>${p.name}</h3>
              <p>Placar: <b style="color:#00b37e;">${p.wins || 0}V</b> / <b style="color:#f75a68;">${p.losses || 0}D</b></p>
            </div>
          </div>
          <button onclick="registerLoss('${p.id}')" class="btn-venceu">
            ME VENCEU!
          </button>
        </div>
      `).join("");
    }

    // --- REGISTRAR VITÓRIA / DERROTA ---
    function registerLoss(winnerId) {
      const winner = playersData[winnerId];
      if (!winner) return;

      const newWins = (winner.wins || 0) + 1;
      db.ref(`players/${winnerId}/wins`).set(newWins);

      // Dispara o Toast da Lista 2 (Confirmação de Voto)
      showVoteToast();

      // Dispara o Pop-up da Lista 1 (Zoeira de Derrota / K.O.)
      showKoModal(winner.name);
    }

    // LISTA 2: Exibe o toast de feedback do voto
    function showVoteToast() {
      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * VOTE_CONFIRMATIONS.length);
      } while (randomIndex === lastVoteIndex && VOTE_CONFIRMATIONS.length > 1);

      lastVoteIndex = randomIndex;

      const toast = document.getElementById("vote-toast");
      document.getElementById("vote-toast-msg").innerText = VOTE_CONFIRMATIONS[randomIndex];
      
      toast.classList.remove("modal-hidden");
      setTimeout(() => {
        toast.classList.add("modal-hidden");
      }, 3000);
    }

    // LISTA 1: Exibe o pop-up com a zoeira de K.O.
    function showKoModal(winnerName) {
      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * DEFEAT_PHRASES.length);
      } while (randomIndex === lastDefeatIndex && DEFEAT_PHRASES.length > 1);

      lastDefeatIndex = randomIndex;

      document.getElementById("ko-player-name").innerText = `${winnerName} levou a melhor!`;
      document.getElementById("ko-phrase").innerText = `"${DEFEAT_PHRASES[randomIndex]}"`;

      document.getElementById("ko-modal").classList.remove("modal-hidden");
    }

    function closeKoModal() {
      document.getElementById("ko-modal").classList.add("modal-hidden");
    }

    // --- ADMIN ---
    function toggleAdminModal() {
      document.getElementById("admin-modal").classList.toggle("modal-hidden");
    }

    function loginAdmin() {
      const pass = document.getElementById("admin-pass-input").value;
      if (pass === "1234") {
        document.getElementById("admin-auth").classList.add("modal-hidden");
        document.getElementById("admin-controls").classList.remove("modal-hidden");
      } else {
        alert("Senha incorreta!");
      }
    }

    function addPlayer() {
      const name = document.getElementById("new-player-name").value.trim();
      const photo = document.getElementById("new-player-photo").value.trim();

      if (!name) return alert("Digite o nome!");

      db.ref("players").push({
        name,
        photo: photo || "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=300",
        wins: 0,
        losses: 0
      });

      document.getElementById("new-player-name").value = "";
      document.getElementById("new-player-photo").value = "";
      alert("Guerreiro Cadastrado!");
    }

    function resetScores() {
      if (confirm("Zerar placar de todos os jogadores?")) {
        Object.keys(playersData).forEach(id => {
          db.ref(`players/${id}/wins`).set(0);
          db.ref(`players/${id}/losses`).set(0);
        });
      }
    }
  </script>
</body>
</html>
